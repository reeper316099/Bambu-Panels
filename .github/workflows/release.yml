name: Build & Release

on:
  push:
    tags:
      - "v*"
      - "V*"

permissions:
  contents: write

env:
  GO2RTC_REPO: AlexxIT/go2rtc
  GO2RTC_TAG: latest
  GH_TOKEN: ${{ github.token }}

jobs:
  create-release-and-sources:
    name: Create Release + source bundles
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (optional, safe to keep)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run tests (non-blocking)
        if: ${{ hashFiles('package.json') != '' }}
        run: |
          set +e
          npm test --if-present
          status=$?
          set -e
          if [ $status -ne 0 ]; then
            echo "Tests failed or not configured (exit $status). Continuing anyway."
          fi

      - name: Create source tar.gz
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist
          tar --exclude=".git" \
              --exclude="node_modules" \
              --exclude=".DS_Store" \
              --exclude="dist" \
              --exclude="pkgroot" \
              --exclude="bundle" \
              -czf "dist/bambu-panels-${VERSION}-source.tar.gz" .

      - name: Create source zip
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist
          zip -r "dist/bambu-panels-${VERSION}-source.zip" . \
            -x ".git/*" "node_modules/*" ".DS_Store" "dist/*" "pkgroot/*" "bundle/*"

      - name: Create GitHub Release + upload source bundles (auto notes)
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/bambu-panels-*-source.tar.gz
            dist/bambu-panels-*-source.zip

  macos-pkg:
    name: macOS .pkg (arm64 + amd64) with go2rtc
    runs-on: macos-latest
    needs: create-release-and-sources
    strategy:
      matrix:
        arch: [arm64, amd64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch go2rtc for macOS ${{ matrix.arch }}
        run: |
          mkdir -p bin
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            RX="go2rtc_mac_arm64\.zip"
          else
            RX="go2rtc_mac_amd64\.zip"
          fi
          python3 scripts/fetch_go2rtc.py "${GO2RTC_REPO}" "${GO2RTC_TAG}" "${RX}" "bin/go2rtc.zip"
          mkdir -p bin/go2rtc_extracted
          unzip -o "bin/go2rtc.zip" -d "bin/go2rtc_extracted"
          GO2RTC_PATH="$(find bin/go2rtc_extracted -type f -name 'go2rtc*' | head -n 1)"
          if [ -z "$GO2RTC_PATH" ]; then
            echo "Could not find go2rtc binary in zip" >&2
            exit 1
          fi
          cp "$GO2RTC_PATH" "bin/go2rtc"
          chmod +x "bin/go2rtc"

      - name: Build .pkg
        run: |
          VERSION="${GITHUB_REF_NAME}"

          rm -rf pkgroot
          mkdir -p pkgroot/Applications/Bambu-Panels

          rsync -a . pkgroot/Applications/Bambu-Panels/ \
            --exclude ".git" \
            --exclude "node_modules" \
            --exclude ".DS_Store" \
            --exclude "pkgroot" \
            --exclude "dist" \
            --exclude "bundle"

          mkdir -p pkgroot/Applications/Bambu-Panels/bin
          cp bin/go2rtc pkgroot/Applications/Bambu-Panels/bin/go2rtc
          chmod +x pkgroot/Applications/Bambu-Panels/bin/go2rtc

          pkgbuild \
            --root pkgroot \
            --identifier com.yourname.bambu-panels \
            --version "${VERSION#v}" \
            "bambu-panels-${VERSION}-macos-${{ matrix.arch }}.pkg"

      - name: Upload .pkg to Release
        uses: softprops/action-gh-release@v2
        with:
          files: bambu-panels-*-macos-*.pkg

  linux-bundle:
    name: Linux tar.gz (amd64) with go2rtc
    runs-on: ubuntu-latest
    needs: create-release-and-sources
    strategy:
      matrix:
        arch: [amd64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch go2rtc for Linux ${{ matrix.arch }}
        run: |
          mkdir -p bin
          RX="go2rtc_linux_amd64$"
          python3 scripts/fetch_go2rtc.py "${GO2RTC_REPO}" "${GO2RTC_TAG}" "${RX}" "bin/go2rtc"
          chmod +x bin/go2rtc

      - name: Package Linux bundle
        run: |
          VERSION="${GITHUB_REF_NAME}"
          rm -rf bundle dist
          mkdir -p bundle/bin dist

          rsync -a . bundle/ \
            --exclude ".git" \
            --exclude "node_modules" \
            --exclude ".DS_Store" \
            --exclude "dist" \
            --exclude "pkgroot" \
            --exclude "bundle"

          cp bin/go2rtc bundle/bin/go2rtc
          chmod +x bundle/bin/go2rtc

          tar -czf "dist/bambu-panels-${VERSION}-linux-amd64.tar.gz" -C bundle .

      - name: Upload Linux bundle
        uses: softprops/action-gh-release@v2
        with:
          files: dist/bambu-panels-*-linux-amd64.tar.gz
