name: Generate Release Notes (Manual)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to update (example: V1.0.9)"
        required: true
        type: string
      previous_tag:
        description: "Optional: previous tag (example: V1.0.8). Leave blank to let GitHub guess."
        required: false
        type: string
      mode:
        description: "Overwrite or append notes into the release body"
        required: true
        default: "overwrite"
        type: choice
        options:
          - overwrite
          - append

permissions:
  contents: write

jobs:
  update-release-notes:
    runs-on: ubuntu-latest
    steps:
      - name: Generate notes and update release body
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          TAG: ${{ inputs.tag }}
          PREV: ${{ inputs.previous_tag }}
          MODE: ${{ inputs.mode }}
        run: |
          python3 - <<'PY'
          import json, os, sys, urllib.request, urllib.error

          token = os.environ["GH_TOKEN"]
          owner = os.environ["OWNER"]
          repo = os.environ["REPO"]
          tag = os.environ["TAG"]
          prev = os.environ.get("PREV", "").strip()
          mode = os.environ.get("MODE", "overwrite").strip()

          api_base = f"https://api.github.com/repos/{owner}/{repo}"

          def request(method, url, payload=None):
            headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "User-Agent": "release-notes-bot"
            }
            data = None
            if payload is not None:
              data = json.dumps(payload).encode("utf-8")
              headers["Content-Type"] = "application/json"
            req = urllib.request.Request(url, data=data, headers=headers, method=method)
            try:
              with urllib.request.urlopen(req) as resp:
                body = resp.read().decode("utf-8")
                return resp.status, body
            except urllib.error.HTTPError as e:
              err_body = e.read().decode("utf-8", errors="replace")
              raise RuntimeError(f"{method} {url} failed: HTTP {e.code}\n{err_body}")

          # 1) Get release by tag
          _, release_body = request("GET", f"{api_base}/releases/tags/{tag}")
          release = json.loads(release_body)
          release_id = release.get("id")
          if not release_id:
            raise RuntimeError(f"No release exists for tag '{tag}'. Create the release first, then rerun this workflow.")
          current_body = release.get("body") or ""

          # 2) Generate notes
          gen_payload = {"tag_name": tag}
          if prev:
            gen_payload["previous_tag_name"] = prev

          _, notes_body = request("POST", f"{api_base}/releases/generate-notes", gen_payload)
          notes = json.loads(notes_body)
          generated = notes.get("body")
          if not generated:
            raise RuntimeError(f"GitHub did not return generated notes.\n{notes_body}")

          # 3) Merge into release body
          if mode == "append" and current_body.strip():
            new_body = current_body.rstrip() + "\n\n---\n\n" + generated.lstrip()
          else:
            new_body = generated

          # 4) Patch the release
          request("PATCH", f"{api_base}/releases/{release_id}", {"body": new_body})
          print(f"Updated release notes for tag={tag} (mode={mode}).")
          PY
